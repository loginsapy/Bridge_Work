version: '3.8'
services:
  web:
    build: .
    ports:
      - "8000:8000" # Mapeado a 8000 para consistencia con gunicorn/waitress
    env_file:
      - .env.docker # Carga variables desde un archivo específico para docker
    depends_on:
      - db
      - redis
  db:
    image: postgres:15
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  worker:
    build: .
    env_file:
      - .env.docker
    command: celery -A run.celery worker --loglevel=info
    depends_on:
      - redis
      - db

  beat:
    build: .
    env_file:
      - .env.docker
    command: celery -A run.celery beat --loglevel=info
    depends_on:
      - redis
      - db

volumes:
  postgres_data:

<!-- Animated suspension bridge background -->
<svg class="bridge-bg bridge-anim" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" pointer-events="none" style="pointer-events:none;">
  <defs>
    <linearGradient id="bg-sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#bfdbfe" stop-opacity="0.65"/>
      <stop offset="60%" stop-color="#e0f2fe" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#f0f9ff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="bg-water" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#bfdbfe" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="g-cable-a" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"   stop-color="#E86A33"/>
      <stop offset="45%"  stop-color="#C74B6D"/>
      <stop offset="100%" stop-color="#F5B945"/>
    </linearGradient>
    <linearGradient id="g-cable-b" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"   stop-color="#F5B945" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#E86A33" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="g-tower" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"   stop-color="#374151"/>
      <stop offset="50%"  stop-color="#6b7280"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <filter id="f-glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="f-cable-glow" x="-5%" y="-200%" width="110%" height="500%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky atmosphere -->
  <rect width="1600" height="900" fill="url(#bg-sky)"/>

  <!-- Horizon mist -->
  <ellipse cx="800" cy="715" rx="1100" ry="105" fill="rgba(255,255,255,0.30)"/>

  <!-- Water surface -->
  <rect x="0" y="715" width="1600" height="185" fill="url(#bg-water)"/>

  <!-- Water ripples -->
  <path class="water-ripple-1" d="M0 740 Q200 733 400 740 Q600 747 800 738 Q1000 729 1200 736 Q1400 743 1600 737" fill="none" stroke="#93c5fd" stroke-width="1.2"/>
  <path class="water-ripple-2" d="M0 763 Q300 756 600 764 Q900 772 1200 761 Q1400 753 1600 759" fill="none" stroke="#93c5fd" stroke-width="1"/>
  <path class="water-ripple-1" d="M0 786 Q250 779 500 787 Q750 795 1000 784 Q1300 773 1600 780" fill="none" stroke="#93c5fd" stroke-width="0.8"/>

  <!-- Faint cable reflection in water -->
  <path d="M -80,820 C 160,755 320,620 448,608 C 590,548 700,510 800,500 C 900,510 1010,548 1152,608 C 1280,620 1440,755 1680,820"
    stroke="#E86A33" stroke-width="1.5" fill="none" stroke-opacity="0.06"/>

  <!-- ═══════════════════════════════════════ -->
  <!--              BRIDGE DECK               -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="0" y="674" width="1600" height="18" fill="#374151" opacity="0.80"/>
  <!-- Lane centre dashes -->
  <line x1="0" y1="683" x2="1600" y2="683" stroke="rgba(255,255,255,0.22)" stroke-width="1.5" stroke-dasharray="52 26"/>
  <!-- Deck top highlight -->
  <line x1="0" y1="674" x2="1600" y2="674" stroke="#6b7280" stroke-width="1.5" opacity="0.55"/>
  <!-- Deck underside shadow strip -->
  <rect x="0" y="692" width="1600" height="5" fill="rgba(0,0,0,0.09)"/>

  <!-- ═══════════════════════════════════════ -->
  <!--           LEFT TOWER (H-frame)         -->
  <!-- ═══════════════════════════════════════ -->
  <!-- Left leg -->
  <rect x="432" y="210" width="14" height="464" fill="url(#g-tower)" opacity="0.90"/>
  <!-- Right leg -->
  <rect x="452" y="210" width="14" height="464" fill="url(#g-tower)" opacity="0.90"/>
  <!-- Tower cap -->
  <rect x="420" y="197" width="58" height="14" rx="3" fill="#1f2937" opacity="0.95"/>
  <!-- Upper crossbeam -->
  <rect x="414" y="272" width="70" height="20" rx="3" fill="#374151" opacity="0.88"/>
  <rect x="414" y="272" width="70" height="5"  rx="2" fill="rgba(255,255,255,0.07)"/>
  <!-- Lower crossbeam -->
  <rect x="422" y="360" width="54" height="16" rx="2" fill="#374151" opacity="0.82"/>
  <!-- Base plate -->
  <rect x="428" y="666" width="42" height="8"  rx="1" fill="#1f2937" opacity="0.55"/>

  <!-- ═══════════════════════════════════════ -->
  <!--           RIGHT TOWER (H-frame)        -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="1132" y="210" width="14" height="464" fill="url(#g-tower)" opacity="0.90"/>
  <rect x="1152" y="210" width="14" height="464" fill="url(#g-tower)" opacity="0.90"/>
  <rect x="1120" y="197" width="58" height="14" rx="3" fill="#1f2937" opacity="0.95"/>
  <rect x="1114" y="272" width="70" height="20" rx="3" fill="#374151" opacity="0.88"/>
  <rect x="1114" y="272" width="70" height="5"  rx="2" fill="rgba(255,255,255,0.07)"/>
  <rect x="1122" y="360" width="54" height="16" rx="2" fill="#374151" opacity="0.82"/>
  <rect x="1128" y="666" width="42" height="8"  rx="1" fill="#1f2937" opacity="0.55"/>

  <!-- ═══════════════════════════════════════ -->
  <!--        MAIN SUSPENSION CABLES          -->
  <!-- ═══════════════════════════════════════ -->
  <!-- Primary cable — brand gradient with soft glow -->
  <path class="cable-a"
    d="M -80,592 C 160,452 320,210 448,200
       C 590,362 700,434 800,450
       C 900,434 1010,362 1152,200
       C 1280,210 1440,452 1680,592"
    stroke="url(#g-cable-a)" stroke-width="3.5" fill="none" filter="url(#f-cable-glow)"/>
  <!-- Secondary cable — slightly offset, slightly fainter -->
  <path class="cable-b"
    d="M -80,608 C 160,468 322,226 450,216
       C 592,378 702,450 800,466
       C 898,450 1008,378 1150,216
       C 1278,226 1440,468 1680,608"
    stroke="url(#g-cable-b)" stroke-width="2.5" fill="none"/>

  <!-- ═══════════════════════════════════════ -->
  <!--    HANGER CABLES (vertical suspenders) -->
  <!-- ═══════════════════════════════════════ -->
  <!-- Left anchorage side -->
  <g stroke="#9ca3af" stroke-opacity="0.42" stroke-width="1" fill="none">
    <line x1="100" y1="542" x2="100" y2="674"/>
    <line x1="170" y1="490" x2="170" y2="674"/>
    <line x1="240" y1="432" x2="240" y2="674"/>
    <line x1="310" y1="368" x2="310" y2="674"/>
    <line x1="375" y1="302" x2="375" y2="674"/>
    <line x1="420" y1="248" x2="420" y2="674"/>
  </g>
  <!-- Centre span (parabolic sag: y = 200 + 250·(1−((x−800)/352)²)) -->
  <g stroke="#9ca3af" stroke-opacity="0.36" stroke-width="1" fill="none">
    <line x1="500"  y1="268" x2="500"  y2="674"/>
    <line x1="550"  y1="322" x2="550"  y2="674"/>
    <line x1="600"  y1="368" x2="600"  y2="674"/>
    <line x1="650"  y1="403" x2="650"  y2="674"/>
    <line x1="700"  y1="430" x2="700"  y2="674"/>
    <line x1="750"  y1="446" x2="750"  y2="674"/>
    <line x1="800"  y1="450" x2="800"  y2="674"/>
    <line x1="850"  y1="446" x2="850"  y2="674"/>
    <line x1="900"  y1="430" x2="900"  y2="674"/>
    <line x1="950"  y1="403" x2="950"  y2="674"/>
    <line x1="1000" y1="368" x2="1000" y2="674"/>
    <line x1="1050" y1="322" x2="1050" y2="674"/>
    <line x1="1100" y1="268" x2="1100" y2="674"/>
  </g>
  <!-- Right anchorage side -->
  <g stroke="#9ca3af" stroke-opacity="0.42" stroke-width="1" fill="none">
    <line x1="1180" y1="248" x2="1180" y2="674"/>
    <line x1="1225" y1="302" x2="1225" y2="674"/>
    <line x1="1290" y1="368" x2="1290" y2="674"/>
    <line x1="1360" y1="432" x2="1360" y2="674"/>
    <line x1="1430" y1="490" x2="1430" y2="674"/>
    <line x1="1500" y1="542" x2="1500" y2="674"/>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!--              LIGHTS                    -->
  <!-- ═══════════════════════════════════════ -->
  <!-- Tower beacons -->
  <g class="tower-beacon-1" transform="translate(449,200)">
    <circle r="7" fill="#F5B945" filter="url(#f-glow)"/>
    <circle r="3" fill="#fff" opacity="0.75"/>
  </g>
  <g class="tower-beacon-2" transform="translate(1149,200)">
    <circle r="7" fill="#F5B945" filter="url(#f-glow)"/>
    <circle r="3" fill="#fff" opacity="0.75"/>
  </g>

  <!-- Deck street lamps -->
  <g fill="#fbbf24" opacity="0.52">
    <circle cx="120"  cy="673" r="2.5"/>
    <circle cx="220"  cy="673" r="2.5"/>
    <circle cx="330"  cy="673" r="2.5"/>
    <circle cx="490"  cy="673" r="2.5"/>
    <circle cx="590"  cy="673" r="2.5"/>
    <circle cx="700"  cy="673" r="2.5"/>
    <circle cx="800"  cy="673" r="2.5"/>
    <circle cx="900"  cy="673" r="2.5"/>
    <circle cx="1010" cy="673" r="2.5"/>
    <circle cx="1110" cy="673" r="2.5"/>
    <circle cx="1270" cy="673" r="2.5"/>
    <circle cx="1380" cy="673" r="2.5"/>
    <circle cx="1480" cy="673" r="2.5"/>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!--           MOVING VEHICLES              -->
  <!-- ═══════════════════════════════════════ -->
  <g class="car-right">
    <circle cx="0" cy="679" r="4"   fill="#fbbf24" opacity="0.85"/>
    <circle cx="-14" cy="679" r="3" fill="#fbbf24" opacity="0.40"/>
  </g>
  <g class="car-left">
    <circle cx="1600" cy="686" r="4"  fill="#fca5a5" opacity="0.75"/>
    <circle cx="1614" cy="686" r="3"  fill="#fca5a5" opacity="0.35"/>
  </g>
  <g class="car-right-2">
    <circle cx="0" cy="686" r="3.5"  fill="#93c5fd" opacity="0.80"/>
    <circle cx="-11" cy="686" r="2.5" fill="#93c5fd" opacity="0.38"/>
  </g>
</svg>
<div class="bridge-glow" aria-hidden="true" style="pointer-events:none;"></div>
